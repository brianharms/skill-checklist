<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Example App — Test Checklist</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
    background: #0d1117;
    color: #c9d1d9;
    padding: 40px 20px;
    line-height: 1.5;
  }
  .container { max-width: 760px; margin: 0 auto; }
  h1 { font-size: 22px; font-weight: 600; color: #e6edf3; margin-bottom: 6px; }
  .subtitle { font-size: 13px; color: #484f58; margin-bottom: 32px; }

  .progress-wrap {
    position: sticky; top: 0; z-index: 20;
    background: #0d1117; padding: 12px 0 8px;
  }
  .progress-bar {
    width: 100%; height: 4px; background: #21262d;
    border-radius: 2px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; border-radius: 2px; width: 0%;
    transition: width 0.4s ease;
    background: linear-gradient(90deg, #3fb950, #58a6ff);
  }
  .progress-stats {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 6px; font-size: 11px; color: #484f58;
  }
  .stat-pass { color: #3fb950; }
  .stat-fail { color: #f85149; }
  .stat-attn { color: #d29922; }
  .stat-skip { color: #484f58; }

  .section { margin-bottom: 32px; }
  .section-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 14px; user-select: none;
  }
  .section-header h2 {
    font-size: 14px; font-weight: 600; color: #e6edf3;
    letter-spacing: 0.5px; text-transform: uppercase;
  }
  .section-port {
    font-size: 11px; color: #484f58; font-weight: 400;
    background: #161b22; padding: 2px 8px; border-radius: 10px;
    border: 1px solid #21262d;
  }
  .section-count { font-size: 11px; color: #484f58; margin-left: auto; }
  .section-divider { height: 1px; background: #21262d; margin-bottom: 16px; }

  .item {
    padding: 10px 12px; border-radius: 8px; margin-bottom: 6px;
    border: 1px solid transparent; transition: all 0.2s ease;
    background: #161b22;
  }
  .item:hover { border-color: #21262d; }
  .item.status-pass { border-left: 3px solid #3fb950; }
  .item.status-fail { border-left: 3px solid #f85149; }
  .item.status-attention { border-left: 3px solid #d29922; }
  .item.status-skip { border-left: 3px solid #30363d; }

  .item-top { display: flex; align-items: flex-start; gap: 12px; }
  .item-content { flex: 1; }
  .item-title { font-size: 14px; color: #c9d1d9; font-weight: 500; }
  .item-desc { font-size: 12px; color: #484f58; margin-top: 2px; }

  .item-steps {
    margin-top: 8px; padding: 8px 12px;
    background: #0d1117; border-radius: 6px;
    border: 1px solid #21262d;
  }
  .item-steps ol {
    margin: 0; padding-left: 18px;
    font-size: 12px; color: #8b949e;
  }
  .item-steps li { margin-bottom: 4px; }
  .item-steps li:last-child { margin-bottom: 0; }
  .item-steps .expect {
    color: #3fb950; font-weight: 500;
  }
  .item-steps .action {
    color: #58a6ff;
  }
  .steps-toggle {
    font-size: 11px; color: #484f58; cursor: pointer;
    background: none; border: none; padding: 2px 6px;
    transition: color 0.15s; margin-top: 6px;
  }
  .steps-toggle:hover { color: #c9d1d9; }
  .item-steps.collapsed { display: none; }

  .item.status-pass .item-title { color: #7ee787; }
  .item.status-fail .item-title { color: #ffa198; }
  .item.status-attention .item-title { color: #e3b341; }
  .item.status-skip .item-title { color: #484f58; text-decoration: line-through; }

  .verdict-row {
    display: flex; gap: 6px; margin-top: 10px; align-items: center;
  }
  .verdict-btn {
    font-size: 11px; font-weight: 600; padding: 3px 10px;
    border-radius: 12px; border: 1.5px solid #30363d;
    background: transparent; color: #484f58; cursor: pointer;
    transition: all 0.15s ease; text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .verdict-btn:hover { border-color: #58a6ff; color: #c9d1d9; }
  .verdict-btn.active-pass { background: #0f2d16; border-color: #3fb950; color: #3fb950; }
  .verdict-btn.active-fail { background: #3d1113; border-color: #f85149; color: #f85149; }
  .verdict-btn.active-attention { background: #2d2206; border-color: #d29922; color: #d29922; }
  .verdict-btn.active-skip { background: #161b22; border-color: #30363d; color: #484f58; }

  .comment-toggle {
    font-size: 11px; color: #484f58; cursor: pointer;
    margin-left: auto; padding: 3px 8px; border: none;
    background: none; transition: color 0.15s;
  }
  .comment-toggle:hover { color: #c9d1d9; }
  .comment-toggle.has-comment { color: #58a6ff; }

  .comment-area { display: none; margin-top: 8px; }
  .comment-area.visible { display: block; }
  .comment-area textarea {
    width: 100%; min-height: 48px; max-height: 200px;
    background: #0d1117; border: 1px solid #21262d; border-radius: 6px;
    color: #c9d1d9; font-family: inherit; font-size: 12px;
    padding: 8px 10px; resize: vertical; outline: none;
  }
  .comment-area textarea:focus { border-color: #58a6ff; }
  .comment-area textarea::placeholder { color: #30363d; }

  .submit-wrap {
    position: sticky; bottom: 0; z-index: 20;
    background: linear-gradient(transparent, #0d1117 30%);
    padding: 24px 0 12px; text-align: center;
  }
  .submit-btn {
    font-size: 14px; font-weight: 600; padding: 12px 32px;
    border-radius: 8px; border: none; cursor: pointer;
    background: #238636; color: #fff; transition: all 0.15s;
    letter-spacing: 0.3px;
  }
  .submit-btn:hover { background: #2ea043; }
  .submit-btn:disabled { background: #21262d; color: #484f58; cursor: default; }
  .submit-hint { font-size: 11px; color: #484f58; margin-top: 6px; }

  .output-overlay {
    display: none; position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.8); backdrop-filter: blur(4px);
    align-items: center; justify-content: center;
  }
  .output-overlay.visible { display: flex; }
  .output-box {
    background: #161b22; border: 1px solid #30363d; border-radius: 10px;
    width: 90%; max-width: 700px; max-height: 80vh; display: flex;
    flex-direction: column; overflow: hidden;
  }
  .output-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 20px; border-bottom: 1px solid #21262d;
  }
  .output-header h3 { font-size: 15px; color: #e6edf3; }
  .output-actions { display: flex; gap: 8px; }
  .output-actions button {
    font-size: 12px; padding: 6px 14px; border-radius: 6px;
    border: 1px solid #30363d; background: #21262d; color: #c9d1d9;
    cursor: pointer; transition: all 0.15s;
  }
  .output-actions button:hover { border-color: #58a6ff; }
  .output-actions button.primary { background: #238636; border-color: #238636; color: #fff; }
  .output-actions button.primary:hover { background: #2ea043; }
  .output-body { padding: 16px 20px; overflow-y: auto; flex: 1; }
  .output-body pre {
    font-family: 'SF Mono', 'Menlo', monospace; font-size: 12px;
    color: #c9d1d9; white-space: pre-wrap; word-break: break-word; line-height: 1.6;
  }
  .copied-toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #238636; color: #fff; padding: 8px 20px; border-radius: 6px;
    font-size: 13px; font-weight: 500; opacity: 0; transition: opacity 0.3s;
    pointer-events: none; z-index: 200;
  }
  .copied-toast.visible { opacity: 1; }
  .reset-btn {
    font-size: 11px; padding: 4px 12px; border-radius: 6px;
    border: 1px solid #30363d; background: transparent; color: #484f58;
    cursor: pointer; transition: all 0.15s; margin-left: 12px;
  }
  .reset-btn:hover { border-color: #f85149; color: #f85149; }
  .export-html-btn {
    font-size: 14px; font-weight: 600; padding: 12px 32px;
    border-radius: 8px; border: none; cursor: pointer;
    background: #1f6feb; color: #fff; transition: all 0.15s;
    letter-spacing: 0.3px; margin-left: 12px;
  }
  .export-html-btn:hover { background: #388bfd; }
</style>
</head>
<body>
<div class="container">
  <h1>Example App — Test Checklist</h1>
  <div class="subtitle">2026-03-20 — All changes from today <button class="reset-btn" onclick="resetAll()">Reset All</button></div>

  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-stats">
      <span><span class="stat-pass" id="statPass">0 pass</span> · <span class="stat-fail" id="statFail">0 fail</span> · <span class="stat-attn" id="statAttn">0 attention</span> · <span class="stat-skip" id="statSkip">0 skip</span></span>
      <span id="progressText">0 / 0 reviewed</span>
    </div>
  </div>

  <div id="sections"></div>

  <div class="submit-wrap">
    <button class="submit-btn" id="submitBtn" disabled>Generate Review</button>
    <button class="export-html-btn" id="exportHtmlBtn">Export as HTML</button>
    <div class="submit-hint" id="submitHint">Review at least one item to enable</div>
  </div>
</div>

<div class="output-overlay" id="outputOverlay">
  <div class="output-box">
    <div class="output-header">
      <h3>Review Summary</h3>
      <div class="output-actions">
        <button onclick="closeOutput()">Close</button>
        <button class="primary" onclick="copyOutput()">Copy to Clipboard</button>
      </div>
    </div>
    <div class="output-body"><pre id="outputPre"></pre></div>
  </div>
</div>
<div class="copied-toast" id="toast">Copied to clipboard</div>

<script>
const DATA = [

      {

          '<span class="expect">EXPECT: Green waveform appears in the visualizer during TTS playback</span>',

      },
      {

        desc: 'Words highlight in time with TTS audio',

          '<span class="expect">EXPECT: Mic toggles OFF again</span>',

      },
      {
        title: 'Interrupt',

const VERDICTS = ['pass', 'fail', 'attention', 'skip'];
const VERDICT_LABELS = { pass: 'Pass', fail: 'Fail', attention: 'Needs Attention', skip: 'Skip' };

// If this file was exported with baked-in state, EMBEDDED_STATE will be set before this script.
// Use embedded state as starting point, then save to localStorage so the recipient can edit.
const HAS_EMBEDDED = typeof EMBEDDED_STATE !== 'undefined' && EMBEDDED_STATE !== null;
const localState = JSON.parse(localStorage.getItem('checklist-v1') || 'null');
const state = (HAS_EMBEDDED && !localState) ? JSON.parse(JSON.stringify(EMBEDDED_STATE)) : (localState || {});
const IS_READONLY = false; // always editable — embedded state just pre-fills

const root = document.getElementById('sections');
let totalItems = 0;

DATA.forEach((section, si) => {
  const div = document.createElement('div');
  div.className = 'section';

  const countSpan = document.createElement('span');
  countSpan.className = 'section-count';

  const header = document.createElement('div');
  header.className = 'section-header';
  header.innerHTML = `<h2>${section.title}</h2><span class="section-port">${section.port}</span>`;
  header.appendChild(countSpan);
  div.appendChild(header);

  const divider = document.createElement('div');
  divider.className = 'section-divider';
  div.appendChild(divider);

  section.items.forEach((item, ii) => {
    const key = `${si}-${ii}`;
    const saved = state[key] || {};
    totalItems++;

    const row = document.createElement('div');
    row.className = 'item' + (saved.verdict ? ` status-${saved.verdict}` : '');
    row.dataset.key = key;

    const content = document.createElement('div');
    content.className = 'item-content';
    content.innerHTML = `<div class="item-title">${item.title}</div><div class="item-desc">${item.desc}</div>`;
    row.appendChild(content);

    // Steps
    const stepsCollapsed = saved.stepsCollapsed !== undefined ? saved.stepsCollapsed : false;
    const stepsDiv = document.createElement('div');
    stepsDiv.className = 'item-steps' + (stepsCollapsed ? ' collapsed' : '');
    const ol = document.createElement('ol');
    item.steps.forEach(s => {
      const li = document.createElement('li');
      li.innerHTML = s;
      ol.appendChild(li);
    });
    stepsDiv.appendChild(ol);
    row.appendChild(stepsDiv);

    const stepsBtn = document.createElement('button');
    stepsBtn.className = 'steps-toggle';
    stepsBtn.textContent = stepsCollapsed ? 'show steps' : 'hide steps';
    stepsBtn.addEventListener('click', () => {
      const isCollapsed = !stepsDiv.classList.contains('collapsed');
      stepsDiv.classList.toggle('collapsed', isCollapsed);
      stepsBtn.textContent = isCollapsed ? 'show steps' : 'hide steps';
      const cur = state[key] || {};
      cur.stepsCollapsed = isCollapsed;
      state[key] = cur;
      save();
    });
    row.appendChild(stepsBtn);

    // Verdict buttons + comment toggle
    const verdictRow = document.createElement('div');
    verdictRow.className = 'verdict-row';

    VERDICTS.forEach(v => {
      const btn = document.createElement('button');
      btn.className = 'verdict-btn' + (saved.verdict === v ? ` active-${v}` : '');
      btn.textContent = VERDICT_LABELS[v];
      btn.addEventListener('click', () => {
        const cur = state[key] || {};
        if (cur.verdict === v) {
          delete cur.verdict;
          row.className = 'item';
        } else {
          cur.verdict = v;
          row.className = `item status-${v}`;
        }
        state[key] = cur;
        if (!cur.verdict && !cur.comment && cur.stepsCollapsed === undefined) delete state[key];
        save();
        verdictRow.querySelectorAll('.verdict-btn').forEach(b => {
          b.className = 'verdict-btn' + (cur.verdict && VERDICT_LABELS[cur.verdict] === b.textContent ? ` active-${cur.verdict}` : '');
        });
      });
      verdictRow.appendChild(btn);
    });

    const commentBtn = document.createElement('button');
    commentBtn.className = 'comment-toggle' + (saved.comment ? ' has-comment' : '');
    commentBtn.textContent = saved.comment ? 'comment' : '+ comment';
    commentBtn.addEventListener('click', () => {
      const area = row.querySelector('.comment-area');
      area.classList.toggle('visible');
      if (area.classList.contains('visible')) area.querySelector('textarea').focus();
    });
    verdictRow.appendChild(commentBtn);
    row.appendChild(verdictRow);

    const commentArea = document.createElement('div');
    commentArea.className = 'comment-area' + (saved.comment ? ' visible' : '');
    const ta = document.createElement('textarea');
    ta.placeholder = 'What happened? What needs fixing?';
    ta.value = saved.comment || '';
    ta.addEventListener('input', () => {
      const cur = state[key] || {};
      cur.comment = ta.value || undefined;
      if (!cur.comment) delete cur.comment;
      state[key] = cur;
      if (!cur.verdict && !cur.comment && cur.stepsCollapsed === undefined) delete state[key];
      commentBtn.className = 'comment-toggle' + (cur.comment ? ' has-comment' : '');
      commentBtn.textContent = cur.comment ? 'comment' : '+ comment';
      save();
    });
    commentArea.appendChild(ta);
    row.appendChild(commentArea);

    div.appendChild(row);
  });

  root.appendChild(div);
});

function save() {
  localStorage.setItem('checklist-v1', JSON.stringify(state));
  updateCounts();
}

function updateCounts() {
  let reviewed = 0, pass = 0, fail = 0, attn = 0, skip = 0;
  Object.values(state).forEach(s => {
    if (!s.verdict) return;
    reviewed++;
    if (s.verdict === 'pass') pass++;
    if (s.verdict === 'fail') fail++;
    if (s.verdict === 'attention') attn++;
    if (s.verdict === 'skip') skip++;
  });

  const pct = totalItems > 0 ? (reviewed / totalItems) * 100 : 0;
  document.getElementById('progressFill').style.width = `${pct}%`;
  document.getElementById('progressText').textContent = `${reviewed} / ${totalItems} reviewed`;
  document.getElementById('statPass').textContent = `${pass} pass`;
  document.getElementById('statFail').textContent = `${fail} fail`;
  document.getElementById('statAttn').textContent = `${attn} attention`;
  document.getElementById('statSkip').textContent = `${skip} skip`;

  const btn = document.getElementById('submitBtn');
  const exportBtn = document.getElementById('exportHtmlBtn');
  const hint = document.getElementById('submitHint');
  if (reviewed > 0) {
    btn.disabled = false;
    hint.textContent = reviewed < totalItems ? `${totalItems - reviewed} items not yet reviewed` : 'All items reviewed';
  } else {
    btn.disabled = true;
    hint.textContent = 'Review at least one item to enable';
  }

  DATA.forEach((section, si) => {
    const sectionEl = root.children[si];
    const sectionReviewed = section.items.filter((_, ii) => state[`${si}-${ii}`]?.verdict).length;
    sectionEl.querySelector('.section-count').textContent = `${sectionReviewed} / ${section.items.length}`;
  });
}

function generateOutput() {
  let lines = [];
  lines.push('# Example App Test Review — 2026-03-20');
  lines.push('');

  let pass = 0, fail = 0, attn = 0, skip = 0, unreviewed = 0;
  DATA.forEach((section, si) => {
    section.items.forEach((_, ii) => {
      const v = state[`${si}-${ii}`]?.verdict;
      if (v === 'pass') pass++;
      else if (v === 'fail') fail++;
      else if (v === 'attention') attn++;
      else if (v === 'skip') skip++;
      else unreviewed++;
    });
  });
  lines.push(`## Summary: ${pass} pass, ${fail} fail, ${attn} needs attention, ${skip} skipped` + (unreviewed ? `, ${unreviewed} not reviewed` : ''));
  lines.push('');

  DATA.forEach((section, si) => {
    lines.push(`## ${section.title} (${section.port})`);
    lines.push('');
    section.items.forEach((item, ii) => {
      const key = `${si}-${ii}`;
      const s = state[key] || {};
      const icon = s.verdict === 'pass' ? 'PASS' : s.verdict === 'fail' ? 'FAIL' : s.verdict === 'attention' ? 'ATTN' : s.verdict === 'skip' ? 'SKIP' : '----';
      lines.push(`[${icon}] ${item.title}`);
      if (s.comment) {
        s.comment.split('\n').forEach(l => lines.push(`       ${l}`));
      }
    });
    lines.push('');
  });

  return lines.join('\n');
}

function resetAll() {
  if (confirm('Reset all verdicts and comments? This cannot be undone.')) {
    localStorage.removeItem('checklist-v1');
    location.reload();
  }
}

function exportAsHtml() {
  // Build export state: copy current state but force all steps expanded
  const exportState = {};
  DATA.forEach((section, si) => {
    section.items.forEach((_, ii) => {
      const key = `${si}-${ii}`;
      const cur = state[key] || {};
      // Always include every item so steps render, force steps open
      const entry = { ...cur };
      delete entry.stepsCollapsed; // all steps expanded in export
      exportState[key] = entry;
    });
  });

  const stateJson = JSON.stringify(exportState, null, 2);
  const injection = `<script>var EMBEDDED_STATE = ${stateJson};<\/script>`;

  // Get the original HTML source by re-fetching it, or reconstruct from current DOM
  // Safest: grab outerHTML and inject before first <script> in body
  const html = document.documentElement.outerHTML;
  const injected = html.replace(/<script>/, injection + '\n<script>');

  const fullHtml = `<!DOCTYPE html>\n${injected}`;
  const now = new Date();
  const ts = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  const filename = `checklist-${ts}.html`;

  // Try blob URL first, fall back to data URI (file:// blocks blob downloads)
  const a = document.createElement('a');
  a.style.display = 'none';
  a.download = filename;
  document.body.appendChild(a);

  try {
    const blob = new Blob([fullHtml], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    a.href = url;
    a.click();
    setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 1000);
  } catch (e) {
    // Fallback: data URI
    a.href = 'data:text/html;charset=utf-8,' + encodeURIComponent(fullHtml);
    a.click();
    setTimeout(() => a.remove(), 1000);
  }
}

document.getElementById('submitBtn').addEventListener('click', () => {
  const output = generateOutput();
  document.getElementById('outputPre').textContent = output;
  document.getElementById('outputOverlay').classList.add('visible');
});

document.getElementById('exportHtmlBtn').addEventListener('click', exportAsHtml);

function closeOutput() {
  document.getElementById('outputOverlay').classList.remove('visible');
}

function copyOutput() {
  const text = document.getElementById('outputPre').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const toast = document.getElementById('toast');
    toast.classList.add('visible');
    setTimeout(() => toast.classList.remove('visible'), 1500);
  });
}

document.getElementById('outputOverlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeOutput();
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeOutput();
});

updateCounts();
</script>
